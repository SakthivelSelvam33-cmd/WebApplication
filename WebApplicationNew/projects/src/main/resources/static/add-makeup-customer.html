<!DOCTYPE html>

<html>


<head>

<title>
Add Makeup Customer
</title>


<link rel="stylesheet"
href="add-makeup-customer.css">


</head>



<body>



<div class="container">



<h1>
Add Makeup Customer
</h1>




<form id="customerForm">



<label>
Customer Name
</label>


<input
type="text"
id="customerName"
placeholder="Enter Name"
required>





<label>
Phone Number
</label>


<input
type="text"
id="phone"
placeholder="Enter Phone"
required>





<label>
Email
</label>


<input
type="email"
id="email"
placeholder="Enter Email">




<label>
Address
</label>


<textarea
id="address"
placeholder="Enter Address">

</textarea>






<button type="submit">

Save Customer

</button>
<button type="submit" onclick="window.location.href='Dashboard.html'" >

BACK TO DASHBOARD

</button>




</form>




</div>




<script src="add-makeup-customer.js"></script>


</body>


</html>
