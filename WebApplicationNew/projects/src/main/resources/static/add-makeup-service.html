<!DOCTYPE html>

<html>


<head>


<title>
Add Makeup Service
</title>


<link rel="stylesheet"
href="add-makeup-service.css">


</head>



<body>




<div class="container">



<h1>
Add Makeup Service
</h1>




<form id="serviceForm">





<label>
Service Name
</label>


<input
type="text"
id="serviceName"
placeholder="Ex: Bridal Makeup"
required>





<label>
Description
</label>


<textarea
id="description"
placeholder="Service Description">

</textarea>






<label>
Price
</label>


<input
type="number"
id="price"
placeholder="Enter Price"
required>






<button type="submit">

Save Service

</button>

<button type="submit" onclick="window.location.href='Dashboard.html'">

BACK DASHBOARD

</button>





</form>




</div>






<script src="add-makeup-service.js"></script>


</body>


</html>
