<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>
Create Account - Tailoring Management System
</title>
<link rel="stylesheet" href="SignUp.css">
</head>
<body>
<div class="signup-box">
<div class="logo">
<h2>SAMS Tailoring and Mackup</h2>
</div>
<h1>Create Account</h1>
<form id="signupForm">
<label>First Name</label>
<input 
type="text"
id="firstName"
name="firstName"
placeholder="Enter First Name">

<label>
Last Name
</label>
<input 
type="text"
id="lastName"
name="lastName"
placeholder="Enter Last Name">
<label>
Email
</label>
<input 
type="email"
id="email"
name="email"
placeholder="Enter Email">
<label>
Phone Number
</label>

<input 
type="text"
id="phone"
name="phone"
placeholder="Enter 10 Digit Phone Number">
<label>
Password
</label>
<input 
type="password"
id="password"
name="password"
placeholder="Enter Password">
<label>
Confirm Password
</label>
<input 
type="password"
id="confirmPassword"
name="confirmPassword"
placeholder="Re-enter Password">
<label>
City
</label>
<input 
type="text"
id="city"
name="city"
placeholder="Enter City">
<label>
State
</label>
<input 
type="text"
id="state"
name="state"
placeholder="Enter State">
<label>
Address
</label>
<textarea
id="address"
name="address"
placeholder="Enter Full Address">
</textarea>
<label>
Company Name
</label>
<input 
type="text"
id="companyName"
name="companyName"
placeholder="Enter Company Name">
<button type="submit">
Create Account
</button>
<p id="message"></p>
<p>
Already have an account?
<a href="login.html">
Login
</a>
</p>
</form>
</div>
<script src="SignUp.js"></script>
</body>
</html>
