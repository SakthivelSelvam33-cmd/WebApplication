<!DOCTYPE html>

<html>


<head>


<title>
Add Makeup Booking
</title>

<link rel="stylesheet"
href="add-makeup-booking.css">


</head>



<body>
    <div class="container">

    <h1>
    Create Makeup Booking
    </h1>

    <form id="bookingForm">

    <label>
    Select Customer
    </label>

    <select id="customerId" required>
    <option value="">

    Select Customer

    </option>
    </select>

    <label>
    Select Makeup Service
    </label>

    <select id="serviceId" required>
    <option value="">

    Select Service

    </option>

    </select>

    <label>
    Service Price
    </label>

    <input
    type="number"
    id="totalAmount"
    readonly>

    <label>
    Booking Date
    </label>

    <input
    type="date"
    id="bookingDate"
    required>
    <label>
    Booking Time
    </label>

    <input
    type="time"
    id="bookingTime"
    required>
    <label>
    Makeup Artist
    </label>
    <input
    type="text"
    id="artistName"
    placeholder="Artist Name">

    <label>
    Advance Amount
    </label>
    <input
    type="number"
    id="advanceAmount">

    <label>
    Payment Status
    </label>
    <select id="paymentStatus">
    <option>
    Pending
    </option>
    <option>
    Partial
    </option>
    <option>
    Paid
    </option>
    </select>

    <label>
    Booking Status
    </label>

    <select id="bookingStatus">

    <option>
    Confirmed
    </option>

    <option>
    Pending
    </option>

    <option>
    Completed
    </option>

    </select>

    <button type="submit">

    Save Booking

    </button>
    <button onclick="window.location.href='Dashboard.html'">

    Back

    </button>
    </form>
    </div>
    <script src="add-makeup-booking.js"></script>
    </body>
    </html>
