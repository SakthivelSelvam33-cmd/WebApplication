<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Customer Measurement
</title>


<link rel="stylesheet" href="measurement.css">


</head>



<body>



<div class="container">



<h1>
Customer Measurement
</h1>




<form id="measurementForm">



<!-- ORDER SELECT -->


<label>
Select Order
</label>


<select id="orderId" required>


<option value="">
Select Customer Order
</option>



</select>








<label>
Chest
</label>


<input
type="number"
id="chest"
placeholder="Chest in cm">






<label>
Waist
</label>


<input
type="number"
id="waist"
placeholder="Waist in cm">








<label>
Shoulder
</label>


<input
type="number"
id="shoulder"
placeholder="Shoulder in cm">








<label>
Sleeve
</label>


<input
type="number"
id="sleeve"
placeholder="Sleeve length">








<label>
Hip
</label>


<input
type="number"
id="hip"
placeholder="Hip">








<label>
Neck
</label>


<input
type="number"
id="neck"
placeholder="Neck">








<label>
Length
</label>


<input
type="number"
id="length"
placeholder="Dress Length">







<button type="submit">

Save Measurement

</button>

<button onclick="window.location.href='Dashboard.html'">

BACK

</button>




</form>



</div>




<script src="measurement.js"></script>


</body>


</html>
