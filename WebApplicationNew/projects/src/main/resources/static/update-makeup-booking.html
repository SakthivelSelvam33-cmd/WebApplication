<!DOCTYPE html>

<html>


<head>


<title>
Update Makeup Booking
</title>


<link rel="stylesheet"
href="update-makeup-booking.css">


</head>



<body>



<div class="container">



<h1>
Update Makeup Booking
</h1>




<form id="updateForm">





<input id="bookingId" hidden>






<label>
Select Customer
</label>


<select id="customerId">


</select>







<label>
Select Service
</label>


<select id="serviceId">


</select>







<label>
Price
</label>


<input 
type="number"
id="totalAmount">







<label>
Booking Date
</label>


<input 
type="date"
id="bookingDate">







<label>
Booking Time
</label>


<input
type="time"
id="bookingTime">






<label>
Artist Name
</label>


<input
id="artistName">







<label>
Advance Amount
</label>


<input
type="number"
id="advanceAmount">






<label>
Payment Status
</label>


<select id="paymentStatus">


<option>
Pending
</option>


<option>
Partial
</option>


<option>
Paid
</option>


</select>







<label>
Booking Status
</label>


<select id="bookingStatus">


<option>
Pending
</option>


<option>
Confirmed
</option>


<option>
Completed
</option>


</select>







<button type="submit">

Update Booking

</button>




</form>



</div>




<script src="update-makeup-booking.js"></script>


</body>

</html>
